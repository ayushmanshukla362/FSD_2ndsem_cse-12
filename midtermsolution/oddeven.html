<!DOCTYPE html>
<html lang="en">
<head>
    <title>Number Logic</title>
</head>
<body>
    <h1>JavaScript Number Logic</h1>

    <script>
        // 1. User enters a number
        let num = parseInt(prompt("Enter a number:"));

        if (!isNaN(num)) {
            // 2. Check if even or odd
            if (num % 2 === 0) {
                document.write("<p>The number <strong>" + num + "</strong> is <strong>Even</strong>.</p>");
            } else {
                document.write("<p>The number <strong>" + num + "</strong> is <strong>Odd</strong>.</p>");
            }

            // 3. Print numbers from 1 to that number using a loop
            document.write("<h3>Counting to " + num + ":</h3>");
            for (let i = 1; i <= num; i++) {
                document.write(i + " ");
            }
        } else {
            document.write("Please enter a valid number.");
        }
    </script>
</body>
</html>
